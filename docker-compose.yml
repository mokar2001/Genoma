services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: raredx-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - hpo_cache:/app/cache
    environment:
      - DEBUG=true
    env_file:
      - .env
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: raredx-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  hpo_cache:

networks:
  default:
    name: raredx-network
